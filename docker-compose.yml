services:
  mysql:
    image: mysql:8.0
    container_name: riding-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: bike_route_planner
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: riding-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
